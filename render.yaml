services:
  - type: web
    name: v1fresh
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python seed.py"
    startCommand: "gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 3 --timeout 60"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.4"
